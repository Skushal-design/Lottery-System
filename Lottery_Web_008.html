<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>🎰 Lottery Master Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
* { font-family: 'Inter', system-ui, sans-serif; }

body {
    background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
    min-height: 100vh;
    padding: 1rem;
    color: #e0f0ff;
}

.glass-card {
    background: rgba(20, 28, 50, 0.95);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(100, 180, 255, 0.25);
    border-radius: 1.5rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.list-item {
    background: rgba(15, 23, 42, 0.98);
    border-bottom: 1px solid rgba(100, 160, 255, 0.2);
    padding: 1rem 1.1rem;
    color: #e0f0ff;
    font-size: 1.1rem;
    min-height: 62px;
    display: flex;
    align-items: center;
}

.list-item:hover {
    background: rgba(37, 58, 110, 0.95);
}

.sn {
    width: 32px;
    height: 32px;
    background: #3b82f6;
    color: white;
    font-weight: 600;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
}

.input-modern {
    background: #0f172a;
    border: 1px solid #4a6fa8;
    color: #f1f5f9;
    font-size: 1.05rem;
    padding: 0.75rem 1rem;
}

.input-modern:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.3);
}

.draw-btn {
    background: linear-gradient(95deg, #f59e0b, #d97706);
    font-size: 1.25rem;
    font-weight: 700;
    padding: 1rem 2rem;
    width: 100%;
    box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
}

#winner {
    font-size: 1.85rem;
    font-weight: 800;
    color: #ffe68a;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.3;
}

@media (max-width: 576px) {
    #winner { font-size: 1.55rem; min-height: 90px; }
    .draw-btn { font-size: 1.1rem; padding: 0.9rem; }
}

.participant-list {
    max-height: 420px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
</style>
</head>
<body>

<div class="container" style="max-width: 920px; margin: 0 auto;">

    <!-- Header -->
    <div class="text-center mb-4">
        <h1 class="fw-bold" style="background: linear-gradient(135deg, #c084fc, #60a5fa); -webkit-background-clip: text; color: transparent;">
            LOTTERY MASTER <span class="fs-5">PRO</span>
        </h1>
        <p class="opacity-75 mb-0">Fair Draw • Serial Number • Mobile Ready</p>
    </div>

    <!-- Add Participant -->
    <div class="glass-card p-3 p-md-4 mb-4">
        <div class="row g-3">
            <div class="col-12 col-sm-10">
                <input type="text" id="nameInput" class="form-control input-modern" placeholder="Enter participant name">
            </div>
            <div class="col-12 col-sm-2">
                <button class="btn btn-primary w-100 h-100" onclick="addName()">+ Add</button>
            </div>
        </div>
    </div>

    <!-- Participants -->
    <div class="glass-card p-3 p-md-4 mb-4">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-3">
            <div class="d-flex align-items-center gap-2">
                <h5 class="fw-semibold m-0">Participants</h5>
                <span id="participantCount" class="badge bg-primary fs-6 px-3 py-2">0</span>
            </div>
            
            <div class="d-flex gap-2 w-100 w-sm-auto">
                <input type="text" id="searchInput" class="form-control input-modern flex-grow-1" 
                       placeholder="Search..." onkeyup="filterList()">
                <button class="btn btn-outline-light" onclick="shuffleList()" title="Shuffle">
                    <i class="bi bi-shuffle"></i>
                </button>
                <button class="btn btn-outline-danger" onclick="clearAll()" title="Clear All">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>

        <div class="participant-list border rounded-3 p-2 bg-dark bg-opacity-50">
            <ul id="list" class="list-unstyled mb-0"></ul>
        </div>
    </div>

    <!-- Draw Settings -->
    <div class="glass-card p-3 p-md-4 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-6 col-md-4">
                <label class="form-label text-light small">Number of Winners</label>
                <input type="number" id="winnerCount" value="1" min="1" max="10" class="form-control input-modern">
            </div>
            <div class="col-6 col-md-5">
                <div class="form-check mt-4">
                    <input class="form-check-input" type="checkbox" id="withoutReplacement" checked>
                    <label class="form-check-label text-light" for="withoutReplacement">
                        Without replacement
                    </label>
                </div>
            </div>
            <div class="col-12 col-md-3 mt-3 mt-md-0">
                <button onclick="drawWinner()" class="draw-btn btn text-white">
                    <i class="bi bi-dice-6 me-2"></i> DRAW WINNER
                </button>
            </div>
        </div>
    </div>

    <!-- Winner Area -->
    <div class="glass-card p-4 p-md-5 text-center winner-area mb-4">
        <h4 class="text-warning mb-3"><i class="bi bi-trophy-fill"></i> WINNER</h4>
        <div id="winner" class="mb-3">✨ Ready to Draw ✨</div>
        <div id="winnerSubtext" class="fs-5 text-info"></div>
        
        <div class="mt-4 d-flex flex-column flex-sm-row gap-2 justify-content-center">
            <button class="btn btn-outline-light" onclick="copyWinner()">📋 Copy Winner</button>
            <button class="btn btn-outline-secondary" onclick="clearWinnerDisplay()">Clear</button>
        </div>
    </div>

    <!-- History -->
    <div class="glass-card p-3 p-md-4">
        <h5 class="mb-3 text-light">Draw History</h5>
        <div id="history" class="small" style="max-height: 220px; overflow-y:auto; color:#c0d0ff;"></div>
    </div>
</div>

<script>
// ======================== STATE ========================
let participants = ["Sarose", "Gayatri", "Niroj", "Sandeep", "Aarav", "Priya"];

let history = [];

// Render List with Serial Number (SN)
function render() {
    const listEl = document.getElementById("list");
    listEl.innerHTML = "";

    participants.forEach((name, i) => {
        const li = document.createElement("li");
        li.className = `list-item d-flex justify-content-between align-items-center rounded-3 mb-2`;
        li.draggable = true;
        li.dataset.index = i;

        li.innerHTML = `
            <div class="d-flex align-items-center gap-3 flex-grow-1">
                <span class="sn">${i + 1}</span>
                <span class="fw-medium">${escapeHtml(name)}</span>
            </div>
            <div class="d-flex gap-1">
                <button class="btn btn-sm btn-outline-danger px-2" onclick="removeAt(${i})">×</button>
            </div>
        `;

        // Drag & Drop
        li.addEventListener("dragstart", e => e.dataTransfer.setData("text/plain", i));
        li.addEventListener("dragover", e => e.preventDefault());
        li.addEventListener("drop", e => {
            e.preventDefault();
            const from = parseInt(e.dataTransfer.getData("text/plain"));
            const to = parseInt(li.dataset.index);
            if (from !== to) moveItem(from, to);
        });

        listEl.appendChild(li);
    });

    document.getElementById("participantCount").textContent = participants.length;
}

function escapeHtml(text) {
    return text.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[m]);
}

function moveItem(from, to) {
    const [moved] = participants.splice(from, 1);
    participants.splice(to, 0, moved);
    render();
}

function addName() {
    const name = document.getElementById("nameInput").value.trim();
    if (!name) return alert("Please enter a name");
    if (participants.some(n => n.toLowerCase() === name.toLowerCase())) {
        return alert("Name already exists!");
    }

    participants.push(name);
    document.getElementById("nameInput").value = "";
    render();
}

function removeAt(i) {
    participants.splice(i, 1);
    render();
}

function shuffleList() {
    for (let i = participants.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [participants[i], participants[j]] = [participants[j], participants[i]];
    }
    render();
}

function filterList() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll("#list .list-item").forEach(item => {
        item.style.display = item.textContent.toLowerCase().includes(term) ? "" : "none";
    });
}

function drawWinner() {
    if (participants.length === 0) return alert("Please add participants first!");

    const count = parseInt(document.getElementById("winnerCount").value) || 1;
    const withoutReplacement = document.getElementById("withoutReplacement").checked;

    const winnerDiv = document.getElementById("winner");
    winnerDiv.innerHTML = `<span style="color:#94a3b8; font-size:1.3rem;">🎲 Drawing...</span>`;

    setTimeout(() => {
        let winners = [];
        let pool = [...participants];

        for (let i = 0; i < count; i++) {
            if (pool.length === 0) break;
            const index = Math.floor(Math.random() * pool.length);
            winners.push(pool[index]);
            if (withoutReplacement) pool.splice(index, 1);
        }

        winnerDiv.innerHTML = winners.map(w => `🏆 ${w.toUpperCase()}`).join("<br>");
        document.getElementById("winnerSubtext").innerHTML = `Congratulations${winners.length > 1 ? ' to the winners' : ''}! 🎉`;

        launchConfetti();
        
        history.unshift({date: new Date().toLocaleString(), winners: winners});
        if (history.length > 20) history.pop();
        renderHistory();
    }, 800);
}

function launchConfetti() {
    confetti({particleCount: 180, spread: 80, origin: { y: 0.6 }});
    setTimeout(() => confetti({particleCount: 140, spread: 100}), 200);
}

function renderHistory() {
    const el = document.getElementById("history");
    el.innerHTML = history.map(h => `
        <div class="border-bottom border-secondary py-2">
            <small class="text-muted">${h.date}</small><br>
            <strong>${h.winners.join(" • ")}</strong>
        </div>
    `).join("");
}

function copyWinner() {
    const text = document.getElementById("winner").innerText;
    navigator.clipboard.writeText(text).then(() => alert("Winner copied to clipboard!"));
}

function clearWinnerDisplay() {
    document.getElementById("winner").innerHTML = `✨ Ready to Draw ✨`;
    document.getElementById("winnerSubtext").innerHTML = "";
}

function clearAll() {
    if (confirm("Clear all participants?")) {
        participants = [];
        render();
    }
}

// Initialize
document.addEventListener("DOMContentLoaded", () => {
    render();
    renderHistory();
});
</script>
</body>
</html>
